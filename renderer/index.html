<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeServer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <div class="row">
      <label for="path">Path:</label>
      <input type="text" id="path" placeholder="e.g. C:/my-project">
    </div>

    <div class="row">
      <label for="port">Port:</label>
      <input type="text" id="port" placeholder="e.g. 5500">
    </div>

    <button id="startBtn">▶ Start Live Server</button>
  </div>
</body>
</html>
